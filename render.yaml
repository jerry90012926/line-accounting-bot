services:
  - type: web
    name: line-accounting-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: IMGUR_CLIENT_ID
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
